name: tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:
    inputs:
      autoload_sanity:
        description: "Run strict PSR-4 autoload sanity checks"
        required: false
        default: "false"

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.3, 8.4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Validate composer
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Autoload sanity check (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.autoload_sanity == 'true' }}
        run: |
          composer dump-autoload --optimize --strict-psr
          php -r "require 'vendor/autoload.php'; exit(class_exists('Nexus\\Workflow\\AiChainServiceProvider') ? 0 : 1);"

      - name: Run tests
        run: composer test

      - name: Pint (check)
        run: composer pint

      - name: PHPStan
        run: composer stan

